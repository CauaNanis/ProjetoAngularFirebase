<ion-content [fullscreen]="true">

    <ion-list>
        <ng-container *ngFor="let livro of this.livros">
            <ion-item>
                <ion-label>Título: {{ livro.titulo }}</ion-label>
            </ion-item>
            <ion-item>
                <ion-label>Sinopse: {{ livro.sinopse }}</ion-label>
            </ion-item>
            <ion-item>
                <ion-label>Número Páginas: {{ livro.paginas }}</ion-label>
            </ion-item>
            <ion-item>
                <ion-label>Categorias</ion-label>
                <ng-container *ngFor="let categoria of livro.categoria">
                    <h3 *ngIf="categoria.nome == 'Científico'" style="color: red;">{{ categoria.nome }}</h3>
                    <h3 *ngIf="categoria.nome == 'Auto-ajuda'" style="color: blue;">{{ categoria.nome }}</h3>
                </ng-container>
            </ion-item>
        </ng-container>
    </ion-list>
    
</ion-content>
