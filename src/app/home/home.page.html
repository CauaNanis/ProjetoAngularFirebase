<ion-content [fullscreen]="true">

    <ion-row class="altura">

        <ion-col size="6" class="imagemfundo">

        </ion-col>

        <ion-col size="6">

            <ion-label>
                <ion-title>Criar Conta</ion-title>
            </ion-label>

            <ion-item>
                <ion-input type="text" placeholder="Nome"></ion-input>
            </ion-item>

            <ion-item>
                <ion-input type="email" placeholder="E-mail"></ion-input>
            </ion-item>

            <ion-item>
                <ion-input type="password" placeholder="Senha"></ion-input>
            </ion-item>
            
            <ion-item>
                <ion-input type="password" placeholder="Confirmar Senha"></ion-input>
            </ion-item>

            <ion-button expand="block" shape="default" size="default" class="criar-conta">
                Criar Conta
            </ion-button>

            <ion-label>
                <h1>Login com</h1>
            </ion-label>

            <div class="botao">
                <ion-button expand="block" class="facebook">
                    facebook
                </ion-button>

                <ion-button expand="block" class="twitter">
                    twitter
                </ion-button>

                <ion-button expand="block" class="google">
                    google
                </ion-button>
            </div>




        </ion-col>

    </ion-row>
    
</ion-content>
